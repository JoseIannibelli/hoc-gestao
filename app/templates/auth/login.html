<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HOC Gestão</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: #3B82F6;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
  </style>
</head>
<body>
<div class="login-card card p-4">
  <div class="text-center mb-4">
    <div class="brand-icon">
      <i class="bi bi-hexagon-fill text-white fs-4"></i>
    </div>
    <h5 class="fw-bold mb-0">HOC Gestão</h5>
    <small class="text-muted">Consultoria TI</small>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold small">E-mail</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold small">Senha</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
    </div>
    <div class="mb-3 d-flex justify-content-between align-items-center">
      <div class="form-check mb-0">
        <input type="checkbox" class="form-check-input" id="remember" name="remember">
        <label class="form-check-label small" for="remember">Manter conectado</label>
      </div>
      <a href="{{ url_for('auth.esqueci_senha') }}"
         class="small text-muted text-decoration-none">
        Esqueci minha senha
      </a>
    </div>
    <button type="submit" class="btn btn-primary w-100">
      <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
